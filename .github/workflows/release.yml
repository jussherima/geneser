name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: geneser
            asset_name: geneser-linux-x64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: geneser
            asset_name: geneser-macos-x64
          - os: macos-14
            target: aarch64-apple-darwin
            artifact_name: geneser
            asset_name: geneser-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: geneser.exe
            asset_name: geneser-windows-x64.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare assets for release
        run: |
          mkdir release-assets
          find artifacts -type f -name 'geneser*' -exec mv {} release-assets/ \;
          ls -R release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true

  npm-publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Copy binaries into platform packages
        run: |
          cp artifacts/geneser-linux-x64/geneser   npm/geneser-linux-x64/geneser
          cp artifacts/geneser-macos-x64/geneser    npm/geneser-darwin-x64/geneser
          cp artifacts/geneser-macos-arm64/geneser  npm/geneser-darwin-arm64/geneser
          cp "artifacts/geneser-windows-x64.exe/geneser.exe" npm/geneser-windows-x64/geneser.exe
          chmod +x npm/geneser-linux-x64/geneser npm/geneser-darwin-x64/geneser npm/geneser-darwin-arm64/geneser

      - name: Set versions
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          for pkg in npm/geneser npm/geneser-linux-x64 npm/geneser-darwin-x64 npm/geneser-darwin-arm64 npm/geneser-windows-x64; do
            node -e "
              const fs = require('fs');
              const p = fs.readFileSync('$pkg/package.json', 'utf8');
              const j = JSON.parse(p);
              j.version = '$VERSION';
              if (j.optionalDependencies) {
                for (const k of Object.keys(j.optionalDependencies)) {
                  j.optionalDependencies[k] = '$VERSION';
                }
              }
              fs.writeFileSync('$pkg/package.json', JSON.stringify(j, null, 2) + '\n');
            "
          done

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in geneser-linux-x64 geneser-darwin-x64 geneser-darwin-arm64 geneser-windows-x64; do
            cd npm/$pkg
            npm publish --access public
            cd ../..
          done

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd npm/geneser
          npm publish --access public
